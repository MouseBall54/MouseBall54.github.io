<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Used Car Before Buying: History and Contract Terms Before Price evidence checklist</title>
  <desc id="desc">Checklist image for consumer evidence, deadline tracking, and escalation records.</desc>
  <rect width="1280" height="720" fill="#edf4f7"/>
  <rect x="74" y="72" width="1132" height="576" rx="36" fill="#ffffff"/>
  <text x="118" y="142" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1f2a44">Evidence Checklist</text>
  <text x="118" y="192" font-family="Arial, sans-serif" font-size="25" fill="#506070">Used Car Before Buying: History and Contract Terms Before Price</text>
  <rect x="118" y="244" width="500" height="300" rx="28" fill="#f7f1e6"/>
  <text x="152" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">English Signals</text>
  <text x="152" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. vehicle history</text>
<text x="152" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. flood or accident</text>
<text x="152" y="448" font-family="Arial, sans-serif" font-size="25" fill="#24303f">3. warranty exclusion</text>
<text x="152" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. finance total cost</text>
  <rect x="662" y="244" width="500" height="300" rx="28" fill="#e8f1e9"/>
  <text x="696" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">한국어 신호</text>
  <text x="696" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. 차량 이력</text>
<text x="696" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. 침수·사고</text>
<text x="696" y="448" font-family="Arial, sans-serif" font-size="25" fill="#24303f">3. 보증 제외</text>
<text x="696" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. 금융 총비용</text>
  <text x="118" y="600" font-family="Arial, sans-serif" font-size="24" fill="#24303f">Keep every complaint short: date, amount, promise, evidence, request, next deadline.</text>
</svg>
