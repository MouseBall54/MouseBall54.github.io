<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cross-Border Shopping Complaint: When It Does Not Work Like a Local Store evidence checklist</title>
  <desc id="desc">Checklist image for consumer evidence, deadline tracking, and escalation records.</desc>
  <rect width="1280" height="720" fill="#edf4f7"/>
  <rect x="74" y="72" width="1132" height="576" rx="36" fill="#ffffff"/>
  <text x="118" y="142" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#1f2a44">Evidence Checklist</text>
  <text x="118" y="192" font-family="Arial, sans-serif" font-size="25" fill="#506070">Cross-Border Shopping Complaint: When It Does Not Work Like a Local Store</text>
  <rect x="118" y="244" width="500" height="300" rx="28" fill="#f7f1e6"/>
  <text x="152" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">English Signals</text>
  <text x="152" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. seller country</text>
<text x="152" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. international return shipping</text>
<text x="152" y="448" font-family="Arial, sans-serif" font-size="25" fill="#24303f">3. customs terms</text>
<text x="152" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. cross-border complaint channel</text>
  <rect x="662" y="244" width="500" height="300" rx="28" fill="#e8f1e9"/>
  <text x="696" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">한국어 신호</text>
  <text x="696" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. 판매자 국가</text>
<text x="696" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. 반품 국제배송비</text>
<text x="696" y="448" font-family="Arial, sans-serif" font-size="25" fill="#24303f">3. 통관 조건</text>
<text x="696" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. 국제 신고 창구</text>
  <text x="118" y="600" font-family="Arial, sans-serif" font-size="24" fill="#24303f">Keep every complaint short: date, amount, promise, evidence, request, next deadline.</text>
</svg>
