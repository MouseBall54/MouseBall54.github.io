<text x="152" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. repair warranty</text>
  <rect x="662" y="244" width="500" height="300" rx="28" fill="#e8f1e9"/>
  <text x="696" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">한국어 신호</text>
  <text x="696" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. 사전 견적</text>
<text x="696" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. 추가 작업 승인</text>
