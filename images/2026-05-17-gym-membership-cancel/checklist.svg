<text x="152" y="448" font-family="Arial, sans-serif" font-size="25" fill="#24303f">3. transfer terms</text>
<text x="152" y="494" font-family="Arial, sans-serif" font-size="25" fill="#24303f">4. cancellation confirmation</text>
  <rect x="662" y="244" width="500" height="300" rx="28" fill="#e8f1e9"/>
  <text x="696" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">한국어 신호</text>
  <text x="696" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. 자동연장</text>
<text x="696" y="402" font-family="Arial, sans-serif" font-size="25" fill="#24303f">2. 중도해지 수수료</text>
