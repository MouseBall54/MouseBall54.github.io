  <text x="118" y="192" font-family="Arial, sans-serif" font-size="25" fill="#506070">Gym Membership Cancellation: Contract and Confirmation Over Verbal Promises</text>
  <rect x="118" y="244" width="500" height="300" rx="28" fill="#f7f1e6"/>
  <text x="152" y="296" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#2c5f8a">English Signals</text>
  <text x="152" y="356" font-family="Arial, sans-serif" font-size="25" fill="#24303f">1. auto-renewal</text>
