  <rect x="62" y="276" width="580" height="268" rx="30" fill="#052e2b" fill-opacity="0.58" stroke="#ffffff" stroke-opacity="0.18"/>
  <text x="72" y="108" fill="#f8fafc" font-size="45" font-family="Avenir, Verdana, sans-serif" font-weight="700">Health Literacy Checklist</text>
  <text x="76" y="160" fill="#dcfce7" font-size="25" font-family="Avenir, Verdana, sans-serif">Hydration and Dehydration Signs: Context Beyond Thirst</text>
  <text x="86" y="326" fill="#f0fdf4" font-size="23" font-family="Avenir, Verdana, sans-serif">Plan fluids before heat and exercise.</text>
<text x="86" y="366" fill="#f0fdf4" font-size="23" font-family="Avenir, Verdana, sans-serif">Read urine color, dizziness, and dry mouth together.</text>
<text x="86" y="406" fill="#f0fdf4" font-size="23" font-family="Avenir, Verdana, sans-serif">Seek medical guidance when illness includes vomiting or diarrhea.</text>
  <text x="76" y="610" fill="#bbf7d0" font-size="22" font-family="Avenir, Verdana, sans-serif">MouseBall54 Health Literacy Guide</text>
