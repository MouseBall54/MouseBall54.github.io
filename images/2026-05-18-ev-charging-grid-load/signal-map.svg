<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">EV Charging and the Grid: Peak Load Before Charger Counts signal map</title>
  <desc id="desc">Checklist-style climate and energy signal map for policy, business, household, and Korea-facing analysis.</desc>
  <rect width="1280" height="720" fill="#eef3ed"/>
  <rect x="70" y="72" width="1140" height="576" rx="36" fill="#ffffff"/>
  <text x="112" y="142" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#16302b">Signal Map</text>
  <text x="112" y="192" font-family="Arial, sans-serif" font-size="25" fill="#56645c">EV Charging and the Grid: Peak Load Before Charger Counts</text>
  <rect x="112" y="240" width="492" height="300" rx="28" fill="#f4efe4"/>
  <text x="146" y="292" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#1f6f5f">English Signals</text>
  <text x="146" y="352" font-family="Arial, sans-serif" font-size="25" fill="#16302b">1. fast-charger power</text>
<text x="146" y="398" font-family="Arial, sans-serif" font-size="25" fill="#16302b">2. peak hours</text>
<text x="146" y="444" font-family="Arial, sans-serif" font-size="25" fill="#16302b">3. smart charging</text>
<text x="146" y="490" font-family="Arial, sans-serif" font-size="25" fill="#16302b">4. truck depots</text>
  <rect x="676" y="240" width="492" height="300" rx="28" fill="#e8f0ec"/>
  <text x="710" y="292" font-family="Arial, sans-serif" font-size="29" font-weight="700" fill="#1f6f5f">한국어 신호</text>
  <text x="710" y="352" font-family="Arial, sans-serif" font-size="25" fill="#16302b">1. 급속충전 출력</text>
<text x="710" y="398" font-family="Arial, sans-serif" font-size="25" fill="#16302b">2. 피크 시간대</text>
<text x="710" y="444" font-family="Arial, sans-serif" font-size="25" fill="#16302b">3. 스마트충전</text>
<text x="710" y="490" font-family="Arial, sans-serif" font-size="25" fill="#16302b">4. 전기트럭 차고지</text>
  <text x="112" y="598" font-family="Arial, sans-serif" font-size="24" fill="#33413c">Read the next update by checking direction, duration, channel, and implementation capacity.</text>
