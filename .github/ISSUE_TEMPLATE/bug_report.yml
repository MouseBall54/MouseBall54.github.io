name: Bug Report
description: Report a problem with MouseBall54's Toolbox.
body:
  - type: markdown
    attributes:
      value: |
        Use this for broken pages, incorrect content, build errors, or layout problems.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Include the local OS, browser, Ruby/Jekyll version if relevant, and the affected URL.
      value: |-
        - Jekyll version:
        - Page URL:
        - Operating system:
        - Browser version:
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe the problem. Attach build logs or screenshots when useful.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: |
        Describe the expected result.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce the behavior
      description: |
        Include commands such as `bundle exec jekyll build --trace` or the page path that fails.
    validations:
      required: true

  - type: textarea
    id: other
    attributes:
      label: Other
      description: |
        Add screenshots, snippets, or related links.
    validations:
      required: false
