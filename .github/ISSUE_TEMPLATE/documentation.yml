name: Documentation
description: Report a typo, unclear post, missing translation, or documentation improvement.
body:
  - type: markdown
    attributes:
      value: |
        Use this for blog posts, Easy Labeling pages, translations, and site documentation.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: |
        What page or post should be improved, and why?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggestion
      description: |
        What should change? Include the affected URL or file path if possible.
    validations:
      required: true
